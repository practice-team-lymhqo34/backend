[project]
name = "LogiFlow"
version = "0.1.0"
description = "LogiFlow project for logistics management API"
requires-python = ">=3.13"
dependencies = [
    "fastapi",
    "uvicorn[standard]"
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pre-commit"
]

[build-system]
requires = ["uv-build<0.12"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "ruff>=0.15.9",
]
