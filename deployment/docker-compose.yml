services:
  db:
    image: postgres:17-alpine
    container_name: logiflow_db
    restart: always
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: logiflow_backend
    restart: always
    depends_on:
      - db
      - minio
    env_file:
      - ../.env
      - .env.s3
    ports:
      - "8000:8000"

  minio:
    image: minio/minio
    container_name: logiflow_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env.s3
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    env_file:
      - .env.s3
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} --api s3v4); do
        echo 'MinIO is not ready yet, retrying in 1s...';
        sleep 1;
      done;
      /usr/bin/mc mb myminio/${S3_BUCKET_NAME} || true;
      /usr/bin/mc anonymous set public myminio/${S3_BUCKET_NAME};
      echo 'MinIO setup complete.';
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
